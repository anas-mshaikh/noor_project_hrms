[pytest]
testpaths = tests
addopts = -q -ra

markers =
    unit: fast, no DB/network.
    integration: DB + services, no HTTP.
    api: HTTP-layer tests (FastAPI TestClient).
    contract: API schema/contract tests (OpenAPI, envelopes).
    e2e: cross-domain user flows (keep minimal).
    golden: live API journeys against a compose-backed backend.
    slow: opt-in slow tests only.
    tenant: multi-tenant isolation assertions.
    rbac: permission/role enforcement assertions.
