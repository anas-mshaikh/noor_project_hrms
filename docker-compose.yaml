services:
  db:
    # Postgres 17 + pgvector extension preinstalled
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: attendance
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: attendance
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # optional: expose for local psql access
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance -d attendance"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      # optional: expose for local debugging
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  migrate:
    # Runs Alembic migrations once on startup, then exits.
    image: attendence_system-backend
    env_file:
      - ./backend/.env.docker
    volumes:
      # Mount backend source for dev velocity (avoids rebuilds for migrations/code).
      - ./backend:/app
      # Persist uploaded videos + outputs to host
      - ./backend/data:/app/data
      # Mount models so the container can use local ONNX / YOLO weights
      - ./backend/models:/app/models
    depends_on:
      db:
        condition: service_healthy
      backend_image:
        condition: service_completed_successfully
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  tests:
    # Test gate (CI/dev): waits for backend + frontend tests to pass, then exits 0.
    #
    # This preserves the existing "docker compose ... --exit-code-from tests tests"
    # workflow, while ensuring web frontend unit tests also run.
    image: alpine:3.19
    depends_on:
      backend_tests:
        condition: service_completed_successfully
      frontend_tests:
        condition: service_completed_successfully
    command: ["sh", "-lc", "echo 'all tests passed'"]
    restart: "no"

  backend_tests:
    # Runs DB vNext smoke + all backend tests after migrations, then exits.
    image: attendence_system-backend-tests
    build:
      context: ./backend
      target: test_deps
    env_file:
      - ./backend/.env.docker
    environment:
      PYTHONPATH: "/app"
    volumes:
      # Mount backend source so tests always run against the working tree.
      - ./backend:/app
      - ./docs:/docs
    depends_on:
      migrate:
        condition: service_completed_successfully
    command:
      [
        "sh",
        "-lc",
        'if [ "${SKIP_TESTS:-0}" = "1" ]; then echo "skipping backend tests"; exit 0; fi; python scripts/run_all_tests.py',
      ]
    restart: "no"

  frontend_tests:
    # Runs web frontend unit tests (Vitest), then exits.
    build:
      context: ./frontend
      # Unit tests require source files; use the dedicated test stage (no `next build`).
      target: test
    environment:
      NODE_ENV: test
    command:
      [
        "sh",
        "-lc",
        'if [ "${SKIP_TESTS:-0}" = "1" ]; then echo "skipping frontend tests"; exit 0; fi; npm run test',
      ]
    restart: "no"

  frontend_e2e:
    # Optional: Playwright E2E smoke tests (profile: e2e).
    #
    # Usage:
    #   docker compose --profile e2e up --build --abort-on-container-exit --exit-code-from frontend_e2e frontend_e2e
    #
    # We use the official Playwright image (includes browsers + system deps).
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    working_dir: /work
    volumes:
      - ./frontend:/work
    environment:
      CI: "1"
      PLAYWRIGHT_BASE_URL: "http://frontend:3000"
    depends_on:
      frontend:
        condition: service_healthy
    command: ["bash", "-lc", "npm ci && npm run test:e2e"]
    profiles: ["e2e"]
    restart: "no"

  backend_image:
    # Shared backend image build (dependencies only).
    #
    # Other backend services reference the same image to avoid rebuilding/exporting
    # identical layers multiple times.
    image: attendence_system-backend
    build:
      context: ./backend
      target: runtime_deps
    command: ["sh", "-lc", "echo backend image built"]
    restart: "no"

  backend:
    image: attendence_system-backend
    env_file:
      - ./backend/.env.docker
    volumes:
      # Mount backend source for dev iteration without rebuild.
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/secrets:/app/secrets:ro
    ports:
      - "8000:8000"
    # The shared `attendence_system-backend` image is built from the `runtime_deps`
    # target (dependencies only). In that target, the base image default CMD is
    # `python3`, which exits immediately in a non-interactive container. Run
    # uvicorn explicitly for the API service.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      tests:
        condition: service_completed_successfully
      backend_image:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; u='http://localhost:8000/api/v1/readyz'; sys.exit(0 if urllib.request.urlopen(u, timeout=2).status==200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  backend_ci:
    image: attendence_system-backend
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/secrets:/app/secrets:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      backend_image:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; u='http://localhost:8000/api/v1/readyz'; sys.exit(0 if urllib.request.urlopen(u, timeout=2).status==200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    profiles: ["backend-ci"]

  worker:
    image: attendence_system-backend
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/secrets:/app/secrets:ro

    depends_on:
      tests:
        condition: service_completed_successfully
      backend_image:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker.worker"]

  hr_worker:
    # Dedicated worker for HR resume parsing (RQ queue: "hr").
    image: attendence_system-backend
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      tests:
        condition: service_completed_successfully
      backend_image:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker.hr_worker"]

  work_worker:
    # Dedicated worker for operational task assignment (RQ queue: "work").
    image: attendence_system-backend
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      tests:
        condition: service_completed_successfully
      backend_image:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker.work_worker"]

  notification_worker:
    # Dedicated poller for in-app notifications (outbox -> notifications).
    image: attendence_system-backend
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      tests:
        condition: service_completed_successfully
      backend_image:
        condition: service_completed_successfully
    command: ["python", "-m", "app.worker.notification_worker"]

  frontend:
    build:
      context: ./frontend
      args:
        # IMPORTANT: NEXT_PUBLIC_* is inlined at build time for client-side calls
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      # Next.js BFF proxy target (server-side). Inside Docker, backend is reachable by service name.
      API_PROXY_TARGET: "http://backend:8000"
      # Dev-only admin gate for /admin/import (override in your shell or .env)
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
