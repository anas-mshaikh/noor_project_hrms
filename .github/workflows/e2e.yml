name: E2E Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "1"

jobs:
  playwright_smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Run compose Playwright smoke
        run: docker compose --profile e2e up --build --abort-on-container-exit --exit-code-from frontend_e2e frontend_e2e
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose --profile e2e logs --no-color
      - name: Upload Playwright report
        if: failure() && hashFiles('frontend/playwright-report/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
      - name: Upload Playwright test results
        if: failure() && hashFiles('frontend/test-results/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          retention-days: 14
      - name: Tear down compose stack
        if: always()
        run: docker compose --profile e2e down -v --remove-orphans
