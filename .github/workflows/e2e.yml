name: E2E Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: e2e-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "1"
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"
  PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"

jobs:
  playwright_smoke:
    name: Frontend smoke (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Disk usage before cleanup
        run: df -h

      - name: Free runner disk space
        run: |
          if [ "${ACT:-false}" = "true" ]; then
            echo "Skipping GitHub-hosted runner cleanup under act"
            exit 0
          fi

          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          df -h

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Clean previous frontend outputs
        run: rm -rf .next playwright-report test-results

      - name: Install frontend dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Disk usage before tests
        run: |
          df -h
          du -sh node_modules .next "$HOME/.cache/ms-playwright" 2>/dev/null || true

      - name: Run Playwright smoke suite
        run: npx playwright test e2e/smoke.spec.ts --project=chromium

      - name: Disk usage after tests
        if: always()
        run: |
          df -h
          du -sh .next playwright-report test-results "$HOME/.cache/ms-playwright" 2>/dev/null || true

      - name: Upload Playwright HTML report
        if: failure() && hashFiles('frontend/playwright-report/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 5

      - name: Publish job summary
        if: always()
        run: |
          {
            echo "## Disk usage"
            echo '```'
            df -h
            echo '```'
            echo
            echo "## Frontend outputs"
            echo '```'
            du -sh .next playwright-report test-results "$HOME/.cache/ms-playwright" 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean frontend test artifacts
        if: always()
        run: rm -rf .next playwright-report test-results
